
services:
    nginx:
        image: nginx:1.21.1
        ports:
            - "80:80"
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./src:/var/www/
        depends_on:
            - php

    php:
        build: ./docker/php
        volumes:
            - ./src:/var/www/

    node:
        image: node:20-alpine
        working_dir: /var/www
        volumes:
            - ./src:/var/www/
        tty: true

    mysql:
        image: mysql:8.0.32
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: attendance_db
            MYSQL_USER: general_user
            MYSQL_PASSWORD: general
        command:
            mysqld --default-authentication-plugin=mysql_native_password
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        platform: linux/amd64
        environment:
            - PMA_ARBITRARY=1
            - PMA_HOST=mysql
            - PMA_USER=general_user
            - PMA_PASSWORD=general
        depends_on:
            - mysql
        ports:
            - 8080:80

    mailhog:
        image: mailhog/mailhog
        ports:
            - "1025:1025"
            - "8025:8025"
